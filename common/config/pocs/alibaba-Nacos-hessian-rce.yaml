id: alibaba-Nacos-hessian-rce

info:
  name: alibaba-Nacos-hessian-rce
  severity: critical
  tags: alibaba,Nacos

http:
  - method: GET
    path:
      - "{{BaseURL}}/nacos/v1/console/server/state"
      - "{{BaseURL}}/v1/console/server/state"
    matchers-condition: or
    matchers:
      - type: word
        words:
          - '"standalone_mode":"cluster"'
        part: body
      - type: regex
        regex:
          - '"version":"2\..*?"'
        part: body
